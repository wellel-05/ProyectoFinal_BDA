<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagina no encontrada — ElderCare</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Outfit',sans-serif;background:#F4F0E8;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#1A1A18}
    .container{text-align:center;padding:40px 20px;max-width:480px}
    .icon-wrap{width:80px;height:80px;background:#FEE2E2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 28px;font-size:32px;color:#B91C1C}
    .code{font-family:'Cormorant Garamond',serif;font-size:80px;font-weight:700;color:#1B4D3E;line-height:1}
    .title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;margin:10px 0 8px}
    .desc{font-size:14px;color:#7A8070;margin-bottom:32px;line-height:1.6}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;background:#1B4D3E;color:#fff;border-radius:9px;text-decoration:none;font-size:13px;font-weight:600;transition:background .16s}
    .btn:hover{background:#2D6A4F}
    .brand{margin-top:40px;font-size:11px;color:#AAA49C;letter-spacing:.08em}
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrap"><i class="fa-solid fa-map-location"></i></div>
    <div class="code">404</div>
    <h1 class="title">Pagina no encontrada</h1>
    <p class="desc">La ruta que buscas no existe o fue movida.<br>Verifica la URL o regresa al inicio.</p>
    <a href="/" class="btn">
      <i class="fa-solid fa-house"></i> Ir al inicio
    </a>
    <p class="brand">ELDERCARE · SISTEMA DE GESTION</p>
  </div>
</body>
</html>
