<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Residente no encontrado</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #F0F4F8;
         min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #fff; border-radius: 16px; padding: 40px 28px; max-width: 340px;
          text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
  .icon { font-size: 40px; color: #EF4444; margin-bottom: 16px; }
  h2   { font-size: 18px; color: #1a1a1a; margin-bottom: 8px; }
  p    { font-size: 13px; color: #666; }
</style>
</head>
<body>
<div class="card">
  <div class="icon"><i class="fa-solid fa-circle-xmark"></i></div>
  <h2>Residente no encontrado</h2>
  <p>El tag NFC no corresponde a ningún residente activo. Verifica que el tag esté correctamente programado.</p>
</div>
</body>
</html>
